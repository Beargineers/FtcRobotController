# OFF: Turret is free floating. Controller doesn't do anything,
# FIXED: Turret is fixed aligned with robot's heading,
# FOLLOW: Turret continuously aiming at the goal,
# SHOOTING: Turret aims at the goal only for shooting and aligned with robot's heading otherwise
TURRET_MODE=SHOOTING

