minGoalDistance=140
zoneSafetyMargin=15

# Programs =========================================================================================
# B or F - Switch to shooting from Back or Front. Also, where do we start from
# P - Push alliance partner but out of launch zone in case they don't have auto
# 1, 2, 3 - collect from the spike, where #1 is the closest to the Back
# 0 - collect from the human loading zone (farthest from the goal)
# 4 - open and collect directly from the ramp
# / - Shoot now. By default, it shoots right before it needs to collect next load and we already have one loaded

ProgramCatalogue=BPF2R31:Push bot,\
F2R31:North,\
B1VVVVVVVVVVV:Visual,\
B10000:Last spike and box cycling,\
F2413:All spikes + ramp
