# suppress inspection "UnusedProperty" for the whole file

# Drive controllers ================================================================================
heading_K=0.024, 0.015, 0.001, 0.3
drive_K=0.026, 0.002, 0.003, 0.3
drive_K2=0.055, 0.001, 0.0086, 0.3
translational_K=0.033, 0.0, 0.0035, 0.3

positionTolerance=1
headingTolerance=1
artifactStrafeTolerance=2

# GoBilda Pinpoint odometry pods offsets in cm. These values are tuned for 3110-0002-0001 Product Insight #1
# https://www.gobilda.com/pinpoint-odometry-computer-imu-sensor-fusion-for-2-wheel-odometry/
pinpoint_xOffset=3.6
pinpoint_yOffset=-10.8
pinpoint_yEncoderDirection=R
# After 20 CCW full circles reported heading angle was +5 degrees. Should be 0. Original yawScalar of a device is 1.0021557
# Formula: newYawScalar = oldYawScalar * (actual_rotation / reported_rotation)
pinpoint_yawScalar=1.001460241525

# SHOOTER ==========================================================================================
LATCH_SERVO_OPEN_POSITION = 0.05
LATCH_SERVE_CLOSED_POSITION = 0.0
SHOOTING_TIME_SECONDS = 1.0


# TURRET  ==========================================================================================
TURRET_AUTOROTATION_ENABLED=false
TURRET_MOTOR_SPEED=1.0
TURRET_MOTOR_DIRECTION=R
TURRET_MIN_ANGLE=-285
TURRET_MAX_ANGLE=100
TURRET_TICKS_LOOKAHEAD=8


# LOCATIONS ========================================================================================
BOX_APPROACH=150,123,90
BOX_SCOOP=156,150,90
BOX_SCOOP_SPEED=1.0

NORTH_START=F6BL:+135
NORTH_SHOOTING=D4TR:+135
SOUTH_START=160,17,180
SOUTH_SHOOTING=D1:+160


# Programs =========================================================================================
# B or F - Switch to shooting from Back or Front. Also, where do we start from
# 1, 2, 3 - collect from the spike, where #1 is the closest to the Back
# 0 - collect from the human loading zone (farthest from the goal)
# 4 - open and collect directly from the ramp
# / - Shoot now. By default, it shoots right before it needs to collect next load and we already have one loaded

ProgramCatalogue=BPF2R31:Push bot,\
F2R31:North,\
B10000:Last spike and box cycling,\
F2413:All spikes + ramp
